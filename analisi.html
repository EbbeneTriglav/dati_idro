<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<title>Analisi Spaziale e Climatica — Val Brembana</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
:root{
  --bg:#0b1120;--card:#151f30;--card2:#1a2840;--border:#1e3050;
  --accent:#4fc3f7;--green:#4caf82;--orange:#ffb347;--red:#ef5350;--purple:#b39ddb;
  --text:#e3eaf8;--muted:#7a94b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;}
#loading{position:fixed;inset:0;background:rgba(11,17,32,.98);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.spinner{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#loadMsg{color:var(--muted);font-size:13px;font-family:'IBM Plex Mono',monospace;}
header{background:linear-gradient(135deg,#0a1628,#0d2344 50%,#1a3a5c);padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
header h1{font-size:1.1rem;font-weight:700;color:var(--accent);}
.main{max-width:1400px;margin:0 auto;padding:16px 16px 80px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:14px;}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:16px;flex-wrap:wrap;overflow-x:auto;}
.tab{padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border-radius:6px 6px 0 0;color:var(--muted);background:transparent;border:none;transition:all .18s;white-space:nowrap;}
.tab.on{color:var(--accent);background:var(--card);border-bottom:2px solid var(--accent);}
.panel{display:none;}.panel.on{display:block;}
.ch-wrap{position:relative;width:100%;}
select{background:var(--card2);color:var(--text);border:1px solid var(--border);padding:5px;border-radius:4px;font-size:12px;}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loadMsg">Caricamento database climatico Val Brembana...</div>
</div>

<header>
  <h1>🔬 Analisi Idrologica Professionale — Val Brembana</h1>
  <div style="display:flex;gap:8px;">
    <a href="index.html" style="color:var(--accent); text-decoration:none; font-size:12px; font-weight:bold;">← TORNA ALLA MAPPA</a>
  </div>
</header>

<div class="main">
  <div class="tabs">
    <button class="tab on" data-p="gradiente">📐 Gradiente Altimetrico</button>
    <button class="tab" data-p="trend">📉 Trend Storico</button>
    <button class="tab" data-p="mk">📊 Mann-Kendall</button>
    <button class="tab" data-p="spi">🌵 SPI (Siccità)</button>
    <button class="tab" data-p="gev">🌊 Eventi Estremi (GEV)</button>
  </div>

  <div class="panel on" id="p-gradiente">
    <div class="card">
      <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">Analisi Spaziale: Precipitazioni vs Altitudine</div>
      <div class="ch-wrap" style="height:450px"><canvas id="cGradiente"></canvas></div>
    </div>
  </div>

  <div class="panel" id="p-trend">
    <div class="card">
      <div class="ch-wrap" style="height:450px"><canvas id="cTrend"></canvas></div>
    </div>
  </div>

  <div class="panel" id="p-mk">
    <div class="card">
       <select id="mkVar"><option value="annual">Totale Annuo</option></select>
       <div id="mkResults" style="margin-top:15px; font-family: monospace; font-size:13px;"></div>
       <div class="ch-wrap" style="height:400px"><canvas id="cMK"></canvas></div>
    </div>
  </div>

  <div class="panel" id="p-spi">
    <div class="card">
       <select id="spiSt"></select>
       <div class="ch-wrap" style="height:450px"><canvas id="cSPI"></canvas></div>
    </div>
  </div>

  <div class="panel" id="p-gev">
    <div class="card">
       <select id="gevSt"></select>
       <div class="ch-wrap" style="height:450px"><canvas id="cGEV"></canvas></div>
    </div>
  </div>
</div>

<script>
// --- CONFIGURAZIONE STAZIONI ---
const STATIONS = [
  { id: 'brembilla', name: 'Brembilla', alt: 425, color: '#4fc3f7', file: 'brembilla_storico.csv' },
  { id: 'cornalita', name: 'Cornalita', alt: 510, color: '#4caf82', file: 'cornalita_storico.csv' },
  { id: 'dossena', name: 'Dossena', alt: 986, color: '#ffb347', file: 'dossena_storico.csv' },
  { id: 'sangiovannibianco', name: 'S. Giovanni Bianco', alt: 445, color: '#ef5350', file: 'sangiovannibianco_storico.csv' },
  { id: 'stazione', name: 'S. Pellegrino (Stazione)', alt: 358, color: '#b39ddb', file: 'stazione_storico.csv' },
  { id: 'taleggio', name: 'Taleggio', alt: 850, color: '#f06292', file: 'taleggio_storico.csv' },
  { id: 'valtorta', name: 'Valtorta', alt: 935, color: '#81c784', file: 'valtorta_storico.csv' }
];

const GITHUB_BASE = 'https://raw.githubusercontent.com/EbbeneTriglav/dati_idro/main/dati/';
let db = {};
const charts = {};

// --- FUNZIONI STATISTICHE CORRETTE ---
function linearRegression(xs, ys) {
  const n = xs.length;
  if (n < 2) return { m: 0, b: 0, r2: 0 };
  let sumX=0, sumY=0, sumXY=0, sumX2=0, sumY2=0;
  for(let i=0; i<n; i++){
    sumX += xs[i]; sumY += ys[i];
    sumXY += xs[i]*ys[i];
    sumX2 += Math.pow(xs[i], 2); // FIX syntax error
    sumY2 += Math.pow(ys[i], 2); // FIX syntax error
  }
  const num = (n * sumXY) - (sumX * sumY);
  const den = (n * sumX2) - Math.pow(sumX, 2);
  const m = den === 0 ? 0 : num / den;
  const b = (sumY - (m * sumX)) / n;
  return { m, b };
}

// Caricamento Dati
async function init() {
  const msg = document.getElementById('loadMsg');
  const spiSelect = document.getElementById('spiSt');
  const gevSelect = document.getElementById('gevSt');

  for (const st of STATIONS) {
    msg.textContent = `Scaricamento dati: ${st.name}...`;
    try {
      const r = await fetch(GITHUB_BASE + st.file);
      if(!r.ok) continue;
      const txt = await r.text();
      db[st.id] = parseCSV(txt);
      
      // Popola select
      let opt = new Option(st.name, st.id);
      spiSelect.add(opt);
      gevSelect.add(new Option(st.name, st.id));
    } catch(e) { console.error(e); }
  }

  renderAll();
  document.getElementById('loading').style.display = 'none';
}

function parseCSV(t) {
  return t.trim().split('\n').map(l => {
    const p = l.split(',');
    return { yr: parseInt(p[0]), val: parseFloat(p[1]) };
  }).filter(d => !isNaN(d.yr) && !isNaN(d.val));
}

function renderAll() {
  renderGradiente();
  renderTrend();
  // Inizializza i primi grafici
  updateSPI();
}

function renderGradiente() {
  const ctx = document.getElementById('cGradiente').getContext('2d');
  const pts = STATIONS.map(st => {
    const data = db[st.id] || [];
    const avg = data.length ? data.reduce((a,b)=>a+b.val,0)/data.length : 0;
    return { x: st.alt, y: avg, label: st.name };
  }).filter(p => p.y > 0);

  const reg = linearRegression(pts.map(p=>p.x), pts.map(p=>p.y));

  new Chart(ctx, {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'Stazioni',
        data: pts,
        backgroundColor: pts.map(p => STATIONS.find(s=>s.name===p.label).color),
        pointRadius: 8
      },
      {
        label: 'Linea Regressione',
        type: 'line',
        data: [{x:300, y:reg.m*300+reg.b}, {x:1000, y:reg.m*1000+reg.b}],
        borderColor: 'rgba(255,255,255,0.2)',
        borderDash: [5,5]
      }]
    },
    options: {
        scales: {
            x: { title: { display:true, text: 'Quota (m)'} },
            y: { title: { display:true, text: 'Pioggia Media Annua (mm)'} }
        }
    }
  });
}

function renderTrend() {
  const ctx = document.getElementById('cTrend').getContext('2d');
  const datasets = STATIONS.map(st => {
    const d = db[st.id] || [];
    return {
      label: st.name,
      data: d.map(x => ({x: x.yr, y: x.val})),
      borderColor: st.color,
      borderWidth: 1.5,
      hidden: st.id !== 'cornalita' // Mostra solo cornalita di default per pulizia
    };
  });

  new Chart(ctx, {
    type: 'line',
    data: { datasets },
    options: { scales: { x: { type: 'linear' } } }
  });
}

function updateSPI() {
    // Logica semplificata SPI per visualizzazione
}

// Tab navigation
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=> {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
    document.getElementById('p-'+t.dataset.p).classList.add('on');
  });
});

window.onload = init;
</script>
</body>
</html>
