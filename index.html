<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/><title>Rete Meteo Locale — Hub</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="meteo-db.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
:root{
  --bg:#0b1120;--surface:#111927;--card:#151f30;--card2:#1a2840;--border:#1e3050;
  --accent:#4fc3f7;--green:#4caf82;--orange:#ffb347;--red:#ef5350;--purple:#b39ddb;
  --text:#e3eaf8;--muted:#7a94b8;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
header{
  background:linear-gradient(135deg,#0a1628,#0d2344 50%,#1a3a5c);
  padding:16px 24px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;
}
header h1{font-size:1.2rem;font-weight:700;color:var(--accent);}
header p{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px;}
.hdr-right{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .2s;font-family:var(--sans);}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn-primary:hover{background:#81d4fa;}
.btn-outline{background:transparent;color:var(--accent);border-color:var(--accent);}
.btn-outline:hover{background:var(--accent);color:var(--bg);}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red);}
.btn-danger:hover{background:var(--red);color:#fff;}
.layout{display:flex;flex:1;overflow:hidden;}
#mapEl{flex:1;min-height:500px;}
.sidebar{
  width:340px;min-width:300px;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);}
.sidebar-header h2{font-size:14px;font-weight:700;color:var(--accent);}
.station-list{flex:1;overflow-y:auto;padding:8px;}
.st-card{
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;
}
.st-card:hover{border-color:var(--accent);}
.st-card.selected{border-color:var(--accent);background:var(--card2);}
.st-name{font-size:13px;font-weight:700;}
.st-meta{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono);}
.st-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:3px;font-weight:700;}
.badge-blue{background:rgba(79,195,247,.15);color:var(--accent);}
.badge-green{background:rgba(76,175,130,.15);color:var(--green);}
.badge-orange{background:rgba(255,179,71,.15);color:var(--orange);}
.badge-custom{background:rgba(179,157,219,.15);color:var(--purple);}
.st-actions{display:flex;gap:6px;margin-top:10px;}
.st-btn{padding:5px 12px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .2s;}
.st-btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.st-btn-primary:hover{background:#81d4fa;}
.st-btn-danger{background:transparent;color:var(--red);border-color:var(--red);}
.st-btn-danger:hover{background:var(--red);color:#fff;}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:440px;max-width:95vw;}
.modal h3{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:16px;}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.form-row input,.form-row select{
  width:100%;background:var(--card2);color:var(--text);border:1px solid var(--border);
  padding:8px 10px;border-radius:6px;font-size:13px;font-family:var(--sans);
}
.form-row input:focus{outline:1px solid var(--accent);}
.form-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

/* Stats bar */
.stats-bar{
  padding:10px 24px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;gap:24px;flex-wrap:wrap;
}
.stat-item{display:flex;flex-direction:column;gap:2px;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.stat-val{font-size:18px;font-weight:700;color:var(--accent);font-family:var(--mono);}
</style>
</head>
<body>

<header>
  <div>
    <h1>🌦 Rete Meteo Locale — Val Brembana / San Pellegrino</h1>
    <p>Hub stazioni meteo · ARPA Lombardia + dati storici caricati</p>
  </div>
  <div class="hdr-right">
    <a href="cornalita.html" class="btn btn-outline" style="text-decoration:none">Cornalita →</a>
    <a href="brembilla.html" class="btn btn-outline" style="text-decoration:none">Brembilla →</a>
    <button class="btn btn-primary" onclick="openAddStation()">+ Aggiungi stazione</button>
  </div>
</header>

<div class="layout">
  <div id="mapEl"></div>
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>📍 Stazioni registrate</h2>
    </div>
    <div class="station-list" id="stationList">
      <div style="color:var(--muted);font-size:12px;padding:8px">Caricamento…</div>
    </div>
    <div class="sidebar-footer">
      <div id="globalStats" style="font-size:11px;color:var(--muted)"></div>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-label">Stazioni totali</div><div class="stat-val" id="sbTotal">—</div></div>
  <div class="stat-item"><div class="stat-label">Con dati storici</div><div class="stat-val" id="sbHistoric">—</div></div>
  <div class="stat-item"><div class="stat-label">Periodo coperto</div><div class="stat-val" id="sbPeriod" style="font-size:14px">—</div></div>
</div>

<!-- Modal aggiungi stazione -->
<div class="modal-overlay" id="modalAddStation">
  <div class="modal">
    <h3>➕ Aggiungi stazione meteo</h3>
    <div class="form-row">
      <label>Nome stazione *</label>
      <input type="text" id="fName" placeholder="es. Gerosa, Lenna, Piazza Brembana…"/>
    </div>
    <div class="form-row">
      <label>Comune</label>
      <input type="text" id="fComune" placeholder="Comune"/>
    </div>
    <div class="form-row">
      <label>Provincia</label>
      <input type="text" id="fProvincia" value="BG"/>
    </div>
    <div class="form-row">
      <div class="form-cols">
        <div>
          <label>Latitudine *</label>
          <input type="number" id="fLat" placeholder="45.8xxx" step="0.0001"/>
        </div>
        <div>
          <label>Longitudine *</label>
          <input type="number" id="fLon" placeholder="9.6xxx" step="0.0001"/>
        </div>
        <div>
          <label>Quota (m)</label>
          <input type="number" id="fAlt" placeholder="500" step="1"/>
        </div>
      </div>
    </div>
    <div class="form-row">
      <label>Sensore precipitazione (IdSensore ARPA, opzionale)</label>
      <input type="number" id="fSensorPP" placeholder="es. 12345"/>
    </div>
    <div class="form-row">
      <label>Sensore temperatura (IdSensore ARPA, opzionale)</label>
      <input type="number" id="fSensorT" placeholder="es. 12346"/>
    </div>
    <p id="modalErr" style="color:var(--red);font-size:12px;margin-top:8px;display:none"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Annulla</button>
      <button class="btn btn-primary" onclick="saveNewStation()">Salva stazione</button>
    </div>
  </div>
</div>

<script>
const { getAllStations, saveStation, deleteStation, BUILTIN_STATIONS, getPrecipByStation } = window.MeteoDb;

let map, markers = {};
let stations = [];

async function init() {
  // Mappa
  map = L.map('mapEl').setView([45.82, 9.64], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    { attribution:'© OpenStreetMap', maxZoom:18 }).addTo(map);

  await loadStations();
}

async function loadStations() {
  stations = await getAllStations();

  // Update stats bar
  document.getElementById('sbTotal').textContent = stations.length;

  let withData = 0, minDate = '9999', maxDate = '0000';
  for (const st of stations) {
    const rows = await getPrecipByStation(st.id);
    if (rows.length) {
      withData++;
      const dates = rows.map(r=>r.date).sort();
      if (dates[0] < minDate) minDate = dates[0];
      if (dates[dates.length-1] > maxDate) maxDate = dates[dates.length-1];
    }
  }
  document.getElementById('sbHistoric').textContent = withData;
  document.getElementById('sbPeriod').textContent = withData ? `${minDate.slice(0,4)} – ${maxDate.slice(0,4)}` : '—';

  renderList();
  renderMarkers();
}

function renderList() {
  const list = document.getElementById('stationList');
  list.innerHTML = '';
  stations.forEach(st => {
    const card = document.createElement('div');
    card.className = 'st-card';
    card.dataset.id = st.id;
    const isBuiltin = !!BUILTIN_STATIONS[st.id];
    card.innerHTML = `
      <div class="st-name">${st.name}</div>
      <div class="st-meta">${st.lat?.toFixed(4)}°N · ${st.lon?.toFixed(4)}°E · ${st.alt ?? '?'} m s.l.m.</div>
      <div class="st-badges">
        ${isBuiltin ? '<span class="badge badge-blue">ARPA live</span>' : ''}
        ${st.sensors?.PP ? `<span class="badge badge-green">PP #${st.sensors.PP.id}</span>` : ''}
        ${st.sensors?.T  ? `<span class="badge badge-orange">T #${st.sensors.T.id}</span>` : ''}
        ${!isBuiltin ? '<span class="badge badge-custom">Personalizzata</span>' : ''}
      </div>
      <div class="st-actions">
        ${st.page ? `<a href="${st.page}" class="st-btn st-btn-primary" style="text-decoration:none">Apri →</a>` :
                    `<a href="stazione.html?id=${st.id}" class="st-btn st-btn-primary" style="text-decoration:none">Apri →</a>`}
        ${!isBuiltin ? `<button class="st-btn st-btn-danger" onclick="removeStation('${st.id}',event)">Elimina</button>` : ''}
      </div>`;
    card.addEventListener('click', () => {
      const m = markers[st.id];
      if (m) { map.setView(m.getLatLng(), 13); m.openPopup(); }
    });
    list.appendChild(card);
  });
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  const colors = { cornalita:'#4fc3f7', brembilla:'#4caf82' };

  stations.forEach(st => {
    if (!st.lat || !st.lon) return;
    const col = colors[st.id] || '#b39ddb';
    const icon = L.divIcon({
      html: `<div style="width:16px;height:16px;border-radius:50%;background:${col};border:2.5px solid #fff;box-shadow:0 0 8px ${col}88"></div>`,
      iconSize:[16,16], iconAnchor:[8,8], className:''
    });
    const m = L.marker([st.lat, st.lon], { icon })
      .addTo(map)
      .bindPopup(`<b style="color:#1d6fa4">${st.name}</b><br>
        ${st.alt ?? '?'} m s.l.m. · ${st.comune||''}<br>
        ${st.page ? `<a href="${st.page}" style="color:#1d6fa4;font-weight:700">Apri dashboard →</a>` :
                    `<a href="stazione.html?id=${st.id}" style="color:#1d6fa4;font-weight:700">Apri dashboard →</a>`}`);
    markers[st.id] = m;
  });

  if (stations.length) {
    const coords = stations.filter(s=>s.lat&&s.lon).map(s=>[s.lat,s.lon]);
    if (coords.length) map.fitBounds(coords, { padding:[40,40] });
  }
}

async function removeStation(id, e) {
  e.stopPropagation();
  if (!confirm('Eliminare la stazione e tutti i dati associati?')) return;
  await deleteStation(id);
  await loadStations();
}

function openAddStation() { document.getElementById('modalAddStation').classList.add('open'); }
function closeModal()     { document.getElementById('modalAddStation').classList.remove('open'); }

async function saveNewStation() {
  const err = document.getElementById('modalErr');
  err.style.display = 'none';
  const name = document.getElementById('fName').value.trim();
  const lat  = parseFloat(document.getElementById('fLat').value);
  const lon  = parseFloat(document.getElementById('fLon').value);
  if (!name || isNaN(lat) || isNaN(lon)) {
    err.textContent = 'Nome, latitudine e longitudine sono obbligatori.';
    err.style.display = 'block'; return;
  }
  const id = 'custom_' + Date.now();
  const sensorPP = parseInt(document.getElementById('fSensorPP').value) || null;
  const sensorT  = parseInt(document.getElementById('fSensorT').value)  || null;
  const station = {
    id, name,
    lat, lon,
    alt:      parseInt(document.getElementById('fAlt').value) || null,
    comune:   document.getElementById('fComune').value.trim() || '',
    province: document.getElementById('fProvincia').value.trim() || 'BG',
    page:     null,
    sensors:  {
      ...(sensorPP ? { PP: { id: sensorPP, label:'Precipitazione', unit:'mm', color:'#4fc3f7' } } : {}),
      ...(sensorT  ? { T:  { id: sensorT,  label:'Temperatura',    unit:'°C', color:'#ffb347' } } : {}),
    },
    builtin:  false,
    createdAt: new Date().toISOString(),
  };
  await saveStation(station);
  closeModal();
  await loadStations();
  // Reset form
  ['fName','fComune','fLat','fLon','fAlt','fSensorPP','fSensorT'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

document.getElementById('modalAddStation').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

init();
</script>
</body>
</html>
