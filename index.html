<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<title>Rete Meteo — Val Brembana</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600;700&display=swap');
:root{
  --bg:#0b1120;--card:#151f30;--card2:#1a2840;--border:#1e3050;
  --accent:#4fc3f7;--green:#4caf82;--orange:#ffb347;--text:#e3eaf8;--muted:#7a94b8;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100vh;}

header{background:linear-gradient(135deg,#0a1628,#0d2344 50%,#1a3a5c);
  padding:14px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
  flex-shrink:0;}
header h1{font-size:1.15rem;font-weight:700;color:var(--accent);}
header p{font-size:11px;color:var(--muted);margin-top:2px;font-family:'IBM Plex Mono',monospace;}

.layout{display:flex;flex:1;overflow:hidden;}

/* Mappa */
#map{flex:1;min-height:400px;}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.leaflet-popup-tip{background:var(--card);}
.leaflet-popup-content{font-family:'IBM Plex Sans',sans-serif;font-size:13px;margin:10px 14px;}
.leaflet-popup-content b{color:var(--accent);}
.leaflet-popup-content a{color:var(--accent);font-weight:700;}
.leaflet-container{background:#0d1a2e;}

/* Sidebar */
.sidebar{width:320px;min-width:280px;background:#111927;border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:13px 15px;border-bottom:1px solid var(--border);}
.sb-head h2{font-size:13px;font-weight:700;color:var(--accent);}
.sb-list{flex:1;overflow-y:auto;padding:8px;}
.st-card{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:11px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .18s;}
.st-card:hover{border-color:var(--accent);}
.st-name{font-size:13px;font-weight:700;}
.st-meta{font-size:11px;color:var(--muted);margin-top:2px;font-family:'IBM Plex Mono',monospace;}
.st-badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap;}
.badge{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.badge-b{background:rgba(79,195,247,.12);color:var(--accent);}
.badge-g{background:rgba(76,175,130,.12);color:var(--green);}
.badge-o{background:rgba(255,179,71,.12);color:var(--orange);}
.st-btn{display:inline-block;margin-top:8px;padding:5px 14px;border-radius:5px;
  font-size:12px;font-weight:700;text-decoration:none;
  background:var(--accent);color:var(--bg);border:none;cursor:pointer;transition:background .18s;}
.st-btn:hover{background:#81d4fa;}

/* Stats bottom */
.stats-bar{padding:9px 20px;background:#0d1624;border-top:1px solid var(--border);
  display:flex;gap:22px;flex-wrap:wrap;flex-shrink:0;}
.stat{display:flex;flex-direction:column;gap:1px;}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.stat-v{font-size:17px;font-weight:700;color:var(--accent);font-family:'IBM Plex Mono',monospace;}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;
  align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:22px;width:420px;max-width:95vw;}
.modal h3{font-size:15px;font-weight:700;color:var(--accent);margin-bottom:14px;}
.frow{margin-bottom:10px;}
.frow label{display:block;font-size:11px;font-weight:700;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.frow input,.frow select{width:100%;background:var(--card2);color:var(--text);
  border:1px solid var(--border);padding:7px 9px;border-radius:5px;font-size:13px;
  font-family:'IBM Plex Sans',sans-serif;}
.frow input:focus{outline:1px solid var(--accent);}
.fcols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:15px;}
.btn{padding:7px 15px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;
  border:1.5px solid;transition:all .18s;}
.btn-outline{background:transparent;color:var(--accent);border-color:var(--accent);}
.btn-outline:hover{background:var(--accent);color:var(--bg);}
.btn-primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.btn-primary:hover{background:#81d4fa;}
.err{color:#ef5350;font-size:12px;margin-top:6px;display:none;}
</style>
</head>
<body>

<header>
  <div>
    <h1>🌦 Rete Meteo Locale — Val Brembana / San Pellegrino</h1>
    <p>Hub stazioni · ARPA Lombardia + dati storici</p>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <a href="cornalita.html" class="st-btn">Cornalita →</a>
    <a href="brembilla.html" class="st-btn" style="background:var(--green)">Brembilla →</a>
    <button class="btn btn-outline" onclick="document.getElementById('addModal').classList.add('open')">+ Stazione</button>
  </div>
</header>

<div class="layout">
  <div id="map"></div>
  <div class="sidebar">
    <div class="sb-head"><h2>📍 Stazioni registrate</h2></div>
    <div class="sb-list" id="stList"></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat"><div class="stat-l">Stazioni</div><div class="stat-v" id="sbN">—</div></div>
  <div class="stat"><div class="stat-l">Stazioni custom</div><div class="stat-v" id="sbC">—</div></div>
</div>

<!-- Modal aggiungi stazione -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h3>➕ Aggiungi stazione personalizzata</h3>
    <div class="frow"><label>Nome *</label><input id="fName" placeholder="es. Lenna, Gerosa…"/></div>
    <div class="frow"><label>Comune</label><input id="fComune"/></div>
    <div class="frow">
      <div class="fcols">
        <div><label>Lat *</label><input id="fLat" type="number" step="0.0001" placeholder="45.xxxx"/></div>
        <div><label>Lon *</label><input id="fLon" type="number" step="0.0001" placeholder="9.xxxx"/></div>
        <div><label>Quota (m)</label><input id="fAlt" type="number" placeholder="500"/></div>
      </div>
    </div>
    <div class="frow"><label>IdSensore Precipitazione ARPA (opzionale)</label><input id="fPP" type="number" placeholder="es. 12345"/></div>
    <div class="frow"><label>IdSensore Temperatura ARPA (opzionale)</label><input id="fT" type="number" placeholder="es. 12346"/></div>
    <div class="err" id="addErr"></div>
    <div class="modal-btns">
      <button class="btn btn-outline" onclick="document.getElementById('addModal').classList.remove('open')">Annulla</button>
      <button class="btn btn-primary" onclick="addStation()">Salva</button>
    </div>
  </div>
</div>

<script>
'use strict';

// Stazioni built-in
const BUILTIN = [
  { id:'cornalita', name:'Cornalita – S. Giovanni Bianco', lat:45.7155, lon:9.6567, alt:622,
    comune:'San Giovanni Bianco', page:'cornalita.html',
    badges:['ARPA live','PP #2278','T #2270','UR #2271'], colors:['b','g','o','b'] },
  { id:'brembilla', name:'Brembilla', lat:45.8254, lon:9.6117, alt:468,
    comune:'Brembilla', page:'brembilla.html',
    badges:['ARPA live','PP #14499','T #14500'], colors:['b','g','o'] },
];

const MARKER_COLORS = { cornalita:'#4fc3f7', brembilla:'#4caf82', custom:'#b39ddb' };

let map, customStations=[];

function loadCustom() {
  try { customStations=JSON.parse(localStorage.getItem('customStations')||'[]'); } catch(e){customStations=[];}
}
function saveCustom() { localStorage.setItem('customStations', JSON.stringify(customStations)); }

function allStations() { return [...BUILTIN, ...customStations]; }

function makeMarker(st) {
  const col = MARKER_COLORS[st.id] || MARKER_COLORS.custom;
  const icon = L.divIcon({
    html:`<div style="width:14px;height:14px;border-radius:50%;background:${col};border:2.5px solid #fff;box-shadow:0 0 8px ${col}88;"></div>`,
    iconSize:[14,14],iconAnchor:[7,7],className:''
  });
  const url = st.page || `stazione.html?id=${encodeURIComponent(st.id)}`;
  return L.marker([st.lat,st.lon],{icon}).bindPopup(
    `<b>${st.name}</b><br>${st.alt??'?'} m s.l.m. · ${st.comune||''}<br>
     <a href="${url}">Apri dashboard →</a>`
  );
}

function renderSidebar() {
  const list = document.getElementById('stList');
  list.innerHTML = '';
  const sts = allStations();
  document.getElementById('sbN').textContent = sts.length;
  document.getElementById('sbC').textContent = customStations.length;

  sts.forEach(st=>{
    const card=document.createElement('div'); card.className='st-card';
    const url=st.page||`stazione.html?id=${encodeURIComponent(st.id)}`;
    const badgeHTML=(st.badges||[]).map((b,i)=>`<span class="badge badge-${(st.colors||[])[i]||'b'}">${b}</span>`).join('');
    const isCustom=!BUILTIN.find(b=>b.id===st.id);
    card.innerHTML=`
      <div class="st-name">${st.name}</div>
      <div class="st-meta">${(st.lat||0).toFixed(4)}°N · ${(st.lon||0).toFixed(4)}°E · ${st.alt??'?'} m</div>
      <div class="st-badges">${badgeHTML}${isCustom?'<span class="badge badge-o">Custom</span>':''}</div>
      <div style="display:flex;gap:6px;margin-top:8px;align-items:center;">
        <a href="${url}" class="st-btn">Apri →</a>
        ${isCustom?`<button onclick="removeStation('${st.id}',event)" style="padding:4px 10px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:#ef5350;border:1.5px solid #ef5350;">Elimina</button>`:''}
      </div>`;
    card.addEventListener('click',e=>{
      if(e.target.tagName==='A'||e.target.tagName==='BUTTON')return;
      // Pan to marker
      map.setView([st.lat,st.lon],13);
    });
    list.appendChild(card);
  });
}

function removeStation(id, e) {
  e.stopPropagation();
  if (!confirm('Eliminare questa stazione?')) return;
  customStations=customStations.filter(s=>s.id!==id);
  saveCustom(); init();
}

function addStation() {
  const err=document.getElementById('addErr');
  err.style.display='none';
  const name=document.getElementById('fName').value.trim();
  const lat=parseFloat(document.getElementById('fLat').value);
  const lon=parseFloat(document.getElementById('fLon').value);
  if (!name||isNaN(lat)||isNaN(lon)) { err.textContent='Nome, latitudine e longitudine obbligatori.'; err.style.display='block'; return; }
  const ppId=parseInt(document.getElementById('fPP').value)||null;
  const tId=parseInt(document.getElementById('fT').value)||null;
  const st={
    id:'custom_'+Date.now(), name, lat, lon,
    alt:parseInt(document.getElementById('fAlt').value)||null,
    comune:document.getElementById('fComune').value.trim(),
    page:null,
    badges:[...(ppId?[`PP #${ppId}`]:[]),...(tId?[`T #${tId}`]:[])],
    colors:['g','o'],
    sensors:{...(ppId?{PP:{id:ppId}}:{}),...(tId?{T:{id:tId}}:{})},
  };
  customStations.push(st);
  saveCustom();
  document.getElementById('addModal').classList.remove('open');
  ['fName','fComune','fLat','fLon','fAlt','fPP','fT'].forEach(id=>document.getElementById(id).value='');
  init();
}

function init() {
  loadCustom();
  const sts=allStations();

  // Init mappa solo la prima volta
  if (!map) {
    map=L.map('map',{zoomControl:true}).setView([45.78,9.64],11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
      attribution:'© OpenStreetMap © CARTO',maxZoom:19
    }).addTo(map);
  } else {
    map.eachLayer(l=>{ if(l instanceof L.Marker) map.removeLayer(l); });
  }

  // Aggiungi marker
  sts.forEach(st=>{ if(st.lat&&st.lon) makeMarker(st).addTo(map); });

  // Fit bounds
  const coords=sts.filter(s=>s.lat&&s.lon).map(s=>[s.lat,s.lon]);
  if (coords.length) map.fitBounds(coords,{padding:[40,40]});

  renderSidebar();
}

document.getElementById('addModal').addEventListener('click',e=>{ if(e.target===e.currentTarget)e.currentTarget.classList.remove('open'); });

init();
</script>
</body>
</html>
